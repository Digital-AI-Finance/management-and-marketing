commitment: "The journal is committed to maintaining the highest level of integrity in the content published."

competing_interests: "This journal has a competing interest policy in place."

research_standards: "All Springer Nature journals require authors to comply with international, national and/or institutional standards of research reporting. This is particularly important for studies involving human and/or animal participants, their data and biological material, and Informed Consent."

plagiarism: "The journal may use plagiarism detection software to screen submissions. If plagiarism is identified, the COPE guidelines on plagiarism will be followed."

peer_review: "Research content published in this journal is peer reviewed (double-anonymous)."

guidelines_reference: "COPE (Committee on Publication Ethics)"
