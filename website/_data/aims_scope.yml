overview: "Management & Marketing is an open-access, double-blind peer-reviewed international journal dedicated to publishing rigorous and impactful research in the fields of business, marketing, and management. Established in 2006 as a project of the Society for Business Excellence, the journal provides a dynamic platform for scholarly exchange and practical insights across disciplines, sectors, and geographies."

scope: "The journal welcomes theoretical, empirical, methodological, survey, resource and case study research that demonstrates academic excellence and practical relevance. It focuses on the intersection of marketing with broader management disciplines, encouraging interdisciplinary approaches and innovative perspectives."

key_areas:
  - "Strategic marketing"
  - "Marketing management"
  - "Marketing research methodology"
  - "Brand management"
  - "Consumer psychology"
  - "Digital advertising"
  - "Social networks"
  - "Innovation and technology"
  - "Information systems"
  - "Operations management"
  - "Product and sustainable design"
  - "Economics"
  - "Finance"
  - "Privacy"
  - "Risk management"
  - "Quality management"

global_outlook: "Management & Marketing invites contributions from scholars and practitioners across all regions, including developed, emerging, and other markets. The journal encourages comparative studies, cross-cultural research, and region-specific insights that contribute to a broader understanding of global business dynamics."

audience: "Serving a diverse audience of academics, educators, students, business leaders, policy makers, and societal stakeholders, the journal aims to foster academic excellence, practical relevance, and societal impact."

contemporary_focus: "It is particularly interested in research that addresses contemporary challenges such as digital transformation, sustainability, innovation, inclusive economic development, and ethical business practices in the broad field of business management and marketing."

vision: "To become a forum of new ideas and approaches able to challenge and change the management and marketing of the old society, feeding both thinkers and doers with valuable new insights from theory and practice."

mission: "Publishing theoretical, empirical, survey, resource and case-based scientific research on business that demonstrates academic or practical relevance."
