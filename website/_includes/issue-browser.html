<div class="sidebar-widget">
  <h3 class="widget-title">Browse issues</h3>
  <div class="widget-content">
    <div class="issue-browser">
      {% for volume in site.data.issues.volumes %}
      <div class="volume-group">
        <h4 class="volume-heading">Volume {{ volume.number }} ({{ volume.year }})</h4>
        <ul class="issue-list">
          {% for issue in volume.issues %}
          <li class="issue-item {% if issue.current %}is-current{% endif %}">
            <a href="{{ issue.url | relative_url }}" class="issue-link">
              Issue {{ issue.number }}
              <span class="issue-date">{{ issue.date }}</span>
              {% if issue.current %}<span class="badge">Current</span>{% endif %}
            </a>
          </li>
          {% endfor %}
        </ul>
      </div>
      {% endfor %}
    </div>
    <a href="{{ '/articles' | relative_url }}#archive" class="widget-link">View all issues →</a>
  </div>
</div>
