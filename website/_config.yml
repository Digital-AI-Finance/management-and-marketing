# Jekyll configuration for Management & Marketing journal

title: "Management & Marketing"
description: "A Springer Nature Open Access Journal"
tagline: "Challenges for the Knowledge Society"
baseurl: "/Management-and-Marketing"
url: "https://digital-ai-finance.github.io"

# Build settings
markdown: kramdown
# theme: minima  # Not needed - site uses fully custom layouts

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .omc
