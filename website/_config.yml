# Jekyll configuration for Management & Marketing journal

title: "Management & Marketing"
description: "A Springer Nature Open Access Journal"
tagline: "Challenges in Knowledge Society"
baseurl: "/management-and-marketing"
url: "https://yourdomain.com"

# Build settings
markdown: kramdown
theme: minima

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections
collections:
  articles:
    output: true
    permalink: /articles/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "article"
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
